version: 2

models:
  - name: fct_tourism_monthly
    description: "Modeling-ready monthly tourism data per German state."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - date
              - state
    columns:
      - name: date
        description: "First day of the month"
        data_tests:
          - not_null
      - name: state
        description: "German state name"
        data_tests:
          - not_null
      - name: arrivals
        description: "Number of arrivals (monthly)"
      - name: overnight
        description: "Number of overnight stays (monthly)"
      - name: year
        description: "Year derived from date"
        data_tests:
          - not_null
      - name: month
        description: "Month derived from date (1-12)"
        data_tests:
          - not_null