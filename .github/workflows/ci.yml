name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Format check with black
        run: black --check src/ tests/

      - name: Run pytest
        run: pytest -v -m "not integration"

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api.Dockerfile
          push: false
          tags: bundeshost-api:ci

      - name: Build Streamlit image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/streamlit.Dockerfile
          push: false
          tags: bundeshost-streamlit:ci

      - name: Build Prefect image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/prefect.Dockerfile
          push: false
          tags: bundeshost-prefect:ci
