# fly.toml app configuration file generated for bundeshost-api on 2026-05-26T18:29:39+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bundeshost-api'
primary_region = 'fra'

[build]
  dockerfile = 'docker/api.Dockerfile'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[http_service.checks]]
  interval = '30s'
  timeout = '5s'
  grace_period = '30s'
  method = 'GET'
  path = '/health'
