# Prefect deployment configuration
# Used by `python -m bundeshost.pipelines.deploy` to define the pull steps
# that managed workers run before loading the flow code.

name: bundeshost
prefect-version: 3.0.0

pull:
- prefect.deployments.steps.git_clone:
    id: clone-step
    repository: https://github.com/ChronoX-TimeSeries/BundesHost-Deployment.git
    branch: main
- prefect.deployments.steps.set_working_directory:
    directory: "{{ clone-step.directory }}"
- prefect.deployments.steps.run_shell_script:
    script: pip install -e "{{ clone-step.directory }}"
    stream_output: true
