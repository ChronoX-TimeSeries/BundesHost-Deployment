services:
  postgres:
    image: postgres:17
    container_name: bundeshost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bundeshost}
      POSTGRES_USER: ${POSTGRES_USER:-bundeshost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bundeshost}
    ports:
      - "5432:5432"
    volumes:
      - bundeshost_pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bundeshost} -d ${POSTGRES_DB:-bundeshost}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: bundeshost-api:dev
    container_name: bundeshost-api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit.Dockerfile
    image: bundeshost-streamlit:dev
    container_name: bundeshost-streamlit
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

  prefect-worker:
    build:
      context: .
      dockerfile: docker/prefect.Dockerfile
    image: bundeshost-prefect:dev
    container_name: bundeshost-prefect-worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      API_BASE_URL: http://api:8000
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: bundeshost-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - bundeshost_prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:latest
    container_name: bundeshost-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - bundeshost_grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  bundeshost_pgdata:
  bundeshost_prometheus_data:
  bundeshost_grafana_data:
